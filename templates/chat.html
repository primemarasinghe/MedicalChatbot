<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MediAssist AI</title>
  <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.5.0/css/all.css"/>
  <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}"/>
</head>
<body>

  <div class="chat-wrapper">
    <div class="chat-card">

      <!-- Header -->
      <div class="chat-header">
        <div class="header-left">
          <div class="bot-icon">
            <i class="fas fa-heartbeat"></i>
            <span class="pulse-ring"></span>
          </div>
          <div class="header-text">
            <span class="bot-name">MediAssist AI</span>
            <p class="bot-sub">
              <span class="live-dot"></span>
              Online &nbsp;·&nbsp; Response time &lt;2s
            </p>
          </div>
        </div>
        <div class="header-badges">
          <span class="badge badge-teal"><i class="fas fa-shield-alt"></i> Secure</span>
          <span class="badge badge-blue">v2.4</span>
        </div>
      </div>

      <!-- Messages -->
      <div id="messageFormeight" class="chat-body">
        <div class="msg-row bot-row">
          <div class="msg-avatar bot-av"><i class="fas fa-heartbeat"></i></div>
          <div>
            <div class="bubble bot-bubble">
              <div class="bubble-tag"><i class="fas fa-robot"></i> MediAssist</div>
              Hello! I'm your AI medical assistant. I can help with symptoms, medications,
              and general health guidance. How are you feeling today?
              <span class="msg-time" id="init-time"></span>
            </div>
          </div>
        </div>
      </div>

      <!-- Quick chips -->
      <div class="chips" id="chips">
        <button class="chip" onclick="quickSend(this)"><i class="fas fa-pills"></i> Medication info</button>
        <button class="chip" onclick="quickSend(this)"><i class="fas fa-stethoscope"></i> Check symptoms</button>
        <button class="chip" onclick="quickSend(this)"><i class="fas fa-syringe"></i> Vaccines</button>
        <button class="chip" onclick="quickSend(this)"><i class="fas fa-first-aid"></i> First aid</button>
      </div>

      <!-- Footer input -->
      <div class="chat-footer">
        <form id="messageArea">
          <input
            type="text"
            id="text"
            name="msg"
            placeholder="Describe your symptoms or ask a question…"
            autocomplete="off"
            class="msg-input"
            required
          />
          <button type="submit" id="send" class="send-btn">
            <i class="fas fa-paper-plane"></i>
          </button>
        </form>
      </div>

    </div>
  </div>

  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
  <script>
    function getTime() {
      const d = new Date();
      return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
    }

    document.getElementById('init-time').textContent = getTime();

    function scrollBottom() {
      const body = $('#messageFormeight');
      body.scrollTop(body[0].scrollHeight);
    }

    function quickSend(el) {
      $('#text').val(el.textContent.trim());
      $('#messageArea').submit();
    }

    $(document).ready(function () {
      $('#messageArea').on('submit', function (event) {
        event.preventDefault();
        const rawText = $('#text').val().trim();
        if (!rawText) return;

        const t = getTime();
        $('#chips').hide();
        $('#text').val('');

        const userHtml = `
          <div class="msg-row usr-row">
            <div class="msg-avatar usr-av">You</div>
            <div>
              <div class="bubble usr-bubble">
                ${rawText}
                <span class="msg-time" style="text-align:right">${t}</span>
              </div>
            </div>
          </div>`;
        $('#messageFormeight').append(userHtml);
        scrollBottom();

        const typingHtml = `
          <div class="msg-row bot-row" id="typing-row">
            <div class="msg-avatar bot-av"><i class="fas fa-heartbeat"></i></div>
            <div class="bubble bot-bubble typing-bubble">
              <span class="td"></span><span class="td"></span><span class="td"></span>
            </div>
          </div>`;
        $('#messageFormeight').append(typingHtml);
        scrollBottom();

        $.ajax({ data: { msg: rawText }, type: 'POST', url: '/get' })
          .done(function (data) {
            $('#typing-row').remove();
            const botHtml = `
              <div class="msg-row bot-row">
                <div class="msg-avatar bot-av"><i class="fas fa-heartbeat"></i></div>
                <div>
                  <div class="bubble bot-bubble">
                    <div class="bubble-tag"><i class="fas fa-robot"></i> MediAssist</div>
                    ${data}
                    <span class="msg-time">${t}</span>
                  </div>
                </div>
              </div>`;
            $('#messageFormeight').append($.parseHTML(botHtml));
            scrollBottom();
          });
      });
    });
  </script>
</body>
</html>
