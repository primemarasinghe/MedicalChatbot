
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  .chat-wrap { display: flex; flex-direction: column; height: 580px; background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-xl); overflow: hidden; font-family: var(--font-sans); }
  .chat-header { padding: 16px 20px; border-bottom: 0.5px solid var(--color-border-tertiary); display: flex; align-items: center; gap: 12px; background: var(--color-background-primary); }
  .avatar-wrap { position: relative; flex-shrink: 0; }
  .avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--color-background-info); display: flex; align-items: center; justify-content: center; }
  .avatar i { font-size: 20px; color: var(--color-text-info); }
  .status-dot { width: 10px; height: 10px; background: #1D9E75; border-radius: 50%; position: absolute; bottom: 1px; right: 1px; border: 2px solid var(--color-background-primary); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(29,158,117,0.4)} 50%{box-shadow:0 0 0 5px rgba(29,158,117,0)} }
  .header-info h2 { font-size: 15px; font-weight: 500; color: var(--color-text-primary); }
  .header-info p { font-size: 12px; color: var(--color-text-secondary); margin-top: 1px; }
  .messages { flex: 1; overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 14px; scroll-behavior: smooth; }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: var(--color-border-tertiary); border-radius: 4px; }
  .msg-row { display: flex; align-items: flex-end; gap: 8px; animation: fadeUp 0.3s ease forwards; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .msg-row.user { flex-direction: row-reverse; }
  .msg-avatar { width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; }
  .msg-avatar.bot { background: var(--color-background-info); color: var(--color-text-info); }
  .msg-avatar.user { background: var(--color-background-tertiary); color: var(--color-text-secondary); font-size: 11px; }
  .bubble { max-width: 72%; padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.55; }
  .bot .bubble { background: var(--color-background-secondary); color: var(--color-text-primary); border-bottom-left-radius: 4px; border: 0.5px solid var(--color-border-tertiary); }
  .user .bubble { background: #185FA5; color: #fff; border-bottom-right-radius: 4px; }
  .msg-time { font-size: 10px; color: var(--color-text-tertiary); padding: 0 4px 2px; }
  .typing-indicator { display: flex; align-items: center; gap: 4px; padding: 12px 14px; background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: 16px; border-bottom-left-radius: 4px; width: fit-content; }
  .dot { width: 6px; height: 6px; background: var(--color-text-tertiary); border-radius: 50%; animation: bounce 1.2s infinite; }
  .dot:nth-child(2){animation-delay:0.2s} .dot:nth-child(3){animation-delay:0.4s}
  @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-5px)} }
  .input-area { padding: 14px 16px; border-top: 0.5px solid var(--color-border-tertiary); display: flex; align-items: center; gap: 10px; background: var(--color-background-primary); }
  #msg-input { flex: 1; border: 0.5px solid var(--color-border-secondary); border-radius: 20px; padding: 9px 16px; font-size: 14px; background: var(--color-background-secondary); color: var(--color-text-primary); outline: none; font-family: var(--font-sans); transition: border-color 0.2s; }
  #msg-input:focus { border-color: var(--color-border-primary); }
  #msg-input::placeholder { color: var(--color-text-tertiary); }
  #send-btn { width: 36px; height: 36px; border-radius: 50%; background: #185FA5; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.15s, background 0.2s; flex-shrink: 0; }
  #send-btn:hover { background: #0C447C; transform: scale(1.05); }
  #send-btn:active { transform: scale(0.95); }
  #send-btn i { font-size: 16px; color: #fff; }
  .suggestion-chips { display: flex; gap: 6px; padding: 0 16px 10px; flex-wrap: wrap; }
  .chip { font-size: 12px; padding: 5px 12px; border-radius: 20px; border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-secondary); cursor: pointer; transition: background 0.15s, color 0.15s; white-space: nowrap; }
  .chip:hover { background: var(--color-background-info); color: var(--color-text-info); border-color: transparent; }
</style>

<h2 class="sr-only">Medical chatbot interface. Type a message or select a suggestion to chat with the assistant.</h2>

<div class="chat-wrap">
  <div class="chat-header">
    <div class="avatar-wrap">
      <div class="avatar"><i class="ti ti-stethoscope" aria-hidden="true"></i></div>
      <div class="status-dot" title="Online"></div>
    </div>
    <div class="header-info">
      <h2>Medical Assistant</h2>
      <p>Ask me anything about your health</p>
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="msg-row bot">
      <div class="msg-avatar bot"><i class="ti ti-stethoscope" aria-hidden="true" style="font-size:14px"></i></div>
      <div>
        <div class="bubble">Hi there! I'm your medical assistant. How can I help you today? 👋</div>
        <div class="msg-time">just now</div>
      </div>
    </div>
  </div>

  <div class="suggestion-chips" id="chips">
    <button class="chip" onclick="quickSend(this)">Common cold symptoms</button>
    <button class="chip" onclick="quickSend(this)">Headache remedies</button>
    <button class="chip" onclick="quickSend(this)">Healthy diet tips</button>
    <button class="chip" onclick="quickSend(this)">When to see a doctor</button>
  </div>

  <div class="input-area">
    <input id="msg-input" type="text" placeholder="Type your message…" autocomplete="off" />
    <button id="send-btn" aria-label="Send message" onclick="sendMessage()">
      <i class="ti ti-send" aria-hidden="true"></i>
    </button>
  </div>
</div>

<script>
  const input = document.getElementById('msg-input');
  const messages = document.getElementById('messages');
  const chips = document.getElementById('chips');

  input.addEventListener('keydown', e => { if(e.key === 'Enter') sendMessage(); });

  function getTime() {
    const d = new Date();
    return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
  }

  function appendMsg(text, role) {
    const row = document.createElement('div');
    row.className = 'msg-row ' + role;
    const av = document.createElement('div');
    av.className = 'msg-avatar ' + role;
    av.innerHTML = role === 'bot' ? '<i class="ti ti-stethoscope" aria-hidden="true" style="font-size:14px"></i>' : 'You';
    const body = document.createElement('div');
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    const time = document.createElement('div');
    time.className = 'msg-time';
    time.textContent = getTime();
    body.appendChild(bubble);
    body.appendChild(time);
    row.appendChild(av);
    row.appendChild(body);
    messages.appendChild(row);
    messages.scrollTop = messages.scrollHeight;
  }

  function showTyping() {
    const row = document.createElement('div');
    row.className = 'msg-row bot';
    row.id = 'typing-row';
    const av = document.createElement('div');
    av.className = 'msg-avatar bot';
    av.innerHTML = '<i class="ti ti-stethoscope" aria-hidden="true" style="font-size:14px"></i>';
    const ind = document.createElement('div');
    ind.className = 'typing-indicator';
    ind.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
    row.appendChild(av);
    row.appendChild(ind);
    messages.appendChild(row);
    messages.scrollTop = messages.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typing-row');
    if(el) el.remove();
  }

  async function sendMessage(text) {
    const msg = text || input.value.trim();
    if(!msg) return;
    input.value = '';
    chips.style.display = 'none';
    appendMsg(msg, 'user');
    showTyping();
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: 'You are a helpful, friendly medical chatbot. Provide accurate, concise health information. Always remind users to consult a real doctor for serious concerns. Keep responses under 3 sentences unless complex.',
          messages: [{role: 'user', content: msg}]
        })
      });
      const data = await res.json();
      removeTyping();
      const reply = data.content?.[0]?.text || "I'm sorry, I couldn't process that. Please try again.";
      appendMsg(reply, 'bot');
    } catch(e) {
      removeTyping();
      appendMsg("Sorry, I'm having trouble connecting. Please try again.", 'bot');
    }
  }

  function quickSend(el) {
    sendMessage(el.textContent);
  }
</script>
